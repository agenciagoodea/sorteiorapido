<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SorteioFácil - Coordenador</title>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/10 border border-slate-200 overflow-hidden">
        <div class="px-10 pt-16 pb-10 text-center bg-white">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-[2rem] mb-8 shadow-2xl shadow-blue-200 transform scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">SorteioFácil</h1>
            <p class="text-slate-500 mt-3 font-medium text-lg italic opacity-80">Simplificando seus sorteios</p>
        </div>

        <div class="flex px-10 border-b border-slate-100 bg-white">
            <button id="tab-login" class="flex-1 py-5 text-xs font-black border-b-2 border-blue-600 text-blue-600 transition-all tracking-[0.2em]">ENTRAR</button>
            <button id="tab-register" class="flex-1 py-5 text-xs font-black border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-all tracking-[0.2em]">CRIAR CONTA</button>
        </div>

        <div class="p-10 bg-white">
            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 px-1 group-focus-within:text-blue-600 transition-colors">E-mail de Acesso</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 px-1 group-focus-within:text-blue-600 transition-colors">Sua Senha</label>
                    <input type="password" id="login-password" required placeholder="••••••••" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <button type="submit" id="btn-login" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-[1.5rem] shadow-2xl shadow-blue-200 transition-all transform active:scale-95 flex items-center justify-center">
                    <span>ACESSAR DASHBOARD</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="space-y-6 hidden">
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 px-1 group-focus-within:text-blue-600 transition-colors">Seu Nome</label>
                    <input type="text" id="reg-name" required placeholder="Como quer ser chamado?" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 px-1 group-focus-within:text-blue-600 transition-colors">E-mail Profissional</label>
                    <input type="email" id="reg-email" required placeholder="exemplo@gmail.com" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 px-1 group-focus-within:text-blue-600 transition-colors">Defina uma Senha</label>
                    <input type="password" id="reg-password" required minlength="6" placeholder="Mínimo 6 caracteres" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[1.5rem] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <button type="submit" id="btn-register" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-[1.5rem] shadow-2xl shadow-blue-200 transition-all transform active:scale-95 flex items-center justify-center">
                    <span>CRIAR CONTA AGORA</span>
                </button>
            </form>

            <div id="error-message" class="mt-8 p-4 bg-red-50 border border-red-100 text-red-600 text-sm font-bold rounded-2xl hidden text-center shadow-sm"></div>

            <div id="conn-check" class="mt-8 flex items-center justify-center gap-2 text-[9px] font-black uppercase tracking-[0.2em] text-slate-300">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-200 conn-dot"></div>
                <span class="conn-text">Verificando Servidor...</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY, isDefaultKey, getSupabaseClient } from '/src/supabase-client.js';

        if (isDefaultKey(SUPABASE_URL, SUPABASE_ANON_KEY)) {
            document.body.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-slate-50 p-6 text-center">
                    <div class="max-w-md bg-white p-10 rounded-[2rem] shadow-xl border border-blue-100">
                        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </div>
                        <h1 class="text-2xl font-black text-slate-800 mb-2 leading-tight">Configuração Necessária</h1>
                        <p class="text-slate-500 text-sm mb-6">As chaves do Supabase não foram encontradas no ambiente de execução.</p>
                        <div class="bg-slate-50 p-6 rounded-2xl text-left border border-slate-100 mb-8">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 italic">Como resolver:</p>
                            <ol class="text-xs text-slate-600 space-y-3 leading-relaxed">
                                <li class="flex gap-2"><span>1.</span><span>Abra o menu <b>Settings</b> (ícone da engrenagem à esquerda).</span></li>
                                <li class="flex gap-2"><span>2.</span><span>Adicione <b>VITE_SUPABASE_URL</b> com sua URL do projeto.</span></li>
                                <li class="flex gap-2"><span>3.</span><span>Adicione <b>VITE_SUPABASE_ANON_KEY</b> com sua chave anônima.</span></li>
                                <li class="flex gap-2"><span>4.</span><span>Aplique as mudanças e o app irá reiniciar.</span></li>
                            </ol>
                        </div>
                    </div>
                </div>
            `;
            throw new Error("Supabase configuration missing");
        }

        const supabase = getSupabaseClient();

        // Check Connection
        const checkConn = async () => {
            const dot = document.querySelector('.conn-dot');
            const text = document.querySelector('.conn-text');
            const errorBox = document.getElementById('error-message');
            try {
                const { error } = await supabase.from('eventos').select('id').limit(1);
                if (error && error.code !== 'PGRST116') throw error;

                dot.classList.replace('bg-slate-200', 'bg-emerald-400');
                text.textContent = 'Servidor Online';
                text.classList.replace('text-slate-300', 'text-emerald-500');
            } catch (err) {
                console.error("Connection Check Failed:", err);
                dot.classList.replace('bg-slate-200', 'bg-red-400');
                text.textContent = 'Indisponível';
                text.classList.replace('text-slate-300', 'text-red-500');

                if (err.message?.includes('supabaseUrl is required') || err.message?.includes('Invalid Key')) {
                    errorBox.textContent = "Erro nas chaves do Supabase. Verifique o menu Settings.";
                    errorBox.classList.remove('hidden');
                }
            }
        };
        checkConn();

        // UI Elements
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-message');

        // Tab Switch Logic
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('border-blue-600', 'text-blue-600');
            tabLogin.classList.remove('border-transparent', 'text-slate-400');
            tabRegister.classList.add('border-transparent', 'text-slate-400');
            tabRegister.classList.remove('border-blue-600', 'text-blue-600');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            errorMsg.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('border-blue-600', 'text-blue-600');
            tabRegister.classList.remove('border-transparent', 'text-slate-400');
            tabLogin.classList.add('border-transparent', 'text-slate-400');
            tabLogin.classList.remove('border-blue-600', 'text-blue-600');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            errorMsg.classList.add('hidden');
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            btn.disabled = true;
            btn.querySelector('span').textContent = 'Carregando...';
            errorMsg.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                btn.disabled = false;
                btn.querySelector('span').textContent = 'Acessar Painel';
            } else {
                window.location.href = '/dashboard.html';
            }
        });

        // Register Logic
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('btn-register');
            const resetRegisterButton = () => {
                btn.disabled = false;
                btn.querySelector('span').textContent = 'CRIAR CONTA AGORA';
            };

            btn.disabled = true;
            btn.querySelector('span').textContent = 'Criando conta...';
            errorMsg.classList.add('hidden');

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: name }
                }
            });

            if (error) {
                showError(error.message);
                resetRegisterButton();
                return;
            }

            // Auth signup ok: now use the user ID returned by Supabase Auth to create profile row.
            const signedUserId = data?.user?.id;
            if (!signedUserId) {
                showError('Conta criada parcialmente, mas não foi possível identificar o usuário. Tente fazer login.');
                resetRegisterButton();
                return;
            }

            let profileSaveFailed = false;
            let profileErrorMessage = '';

            const { error: insertError } = await supabase
                .from('coordenadores')
                .insert([{ id: signedUserId, nome: name, email }]);

            if (insertError) {
                profileSaveFailed = true;
                profileErrorMessage = insertError.message || 'erro desconhecido';
                console.error('[signup] falha ao salvar perfil em coordenadores', {
                    userId: signedUserId,
                    email,
                    code: insertError.code,
                    message: insertError.message,
                    details: insertError.details,
                    hint: insertError.hint
                });
            }

            if (profileSaveFailed) {
                alert(`Conta criada no Auth com sucesso. Não foi possível salvar o perfil agora (${profileErrorMessage}). Você será redirecionado para o dashboard.`);
            } else {
                alert('Conta criada com sucesso! Redirecionando para o dashboard.');
            }

            // Mesmo se o perfil falhar, a conta Auth já existe. Redirecionar conforme solicitado.
            window.location.href = '/dashboard.html';
        });

        // Check session
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = '/dashboard.html';
            }
        });
    </script>
</body>
</html>
